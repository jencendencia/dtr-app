<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Biometric DTR App</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dtrForm.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Activation Overlay (shown before login if not activated) -->
  <div class="login-overlay" id="activation-overlay" style="display: none;">
    <div class="login-card">
      <div class="login-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2 id="activation-title">Activate License</h2>
      <p class="login-subtitle">Enter your license key to activate the application</p>
      <form id="activation-form">
        <div class="login-field">
          <label for="activation-key">License Key</label>
          <input type="text" id="activation-key" placeholder="DTR-XXXX-XXXX-XXXX" autocomplete="off" style="text-transform:uppercase;letter-spacing:1px;font-family:monospace;" required>
        </div>
        <p class="login-error" id="activation-error"></p>
        <button type="submit" class="login-btn" id="btn-activate">Activate</button>
      </form>
      <p style="font-size:11px;color:var(--text-muted);margin-top:16px;">Requires an internet connection for activation</p>
    </div>
  </div>

  <!-- Login Overlay -->
  <div class="login-overlay" id="login-overlay">
    <button class="login-theme-toggle" id="btn-login-theme-toggle" title="Toggle Theme">
      <svg id="login-theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="login-theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <div class="login-card">
      <div class="login-icon" id="login-icon-default">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <circle cx="12" cy="10" r="3"/>
          <path d="M6.168 18.849A4 4 0 0 1 10 16h4a4 4 0 0 1 3.834 2.855"/>
        </svg>
      </div>
      <img id="login-logo" src="" alt="" style="display:none;width:64px;height:64px;object-fit:contain;border-radius:10px;margin:0 auto 12px auto;">
      <h2 id="login-title">DTR System</h2>
      <p class="login-subtitle">Sign in to continue</p>
      <form id="login-form">
        <div class="login-field">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter username" autocomplete="off" required>
        </div>
        <div class="login-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter password" required>
        </div>
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <!-- App Container (hidden until login) -->
  <div class="app-container" id="app-container" style="display: none;">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img id="sidebar-logo" src="" alt="" style="display:none;width:30px;height:30px;object-fit:contain;border-radius:6px;flex-shrink:0;">
        <h2 id="sidebar-title">DTR System</h2>
      </div>
      <nav>
        <button class="nav-btn active" id="nav-dashboard">Dashboard</button>
        <button class="nav-btn" id="nav-devices">Devices</button>
        <button class="nav-btn" id="nav-teachers">Teachers</button>
        <button class="nav-btn" id="nav-dtr">Print DTR</button>
        <button class="nav-btn" id="nav-search-teacher">Search Teacher</button>
        <button class="nav-btn" id="nav-admin">Time Config</button>
        <button class="nav-btn" id="nav-logs">Users Log</button>
        <button class="nav-btn" id="nav-settings">Settings</button>
        <button class="nav-btn" id="nav-about">About</button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" id="user-info">
          <span class="user-avatar" id="user-avatar">A</span>
          <span class="user-name" id="user-name">Admin</span>
        </div>
        <button class="theme-toggle-btn" id="btn-theme-toggle">
          <svg id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <span id="theme-toggle-label">Dark Mode</span>
        </button>
        <button class="logout-btn" id="btn-logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </aside>
    <main class="content" id="main-content">
      <!-- Content injected by JS -->
    </main>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
